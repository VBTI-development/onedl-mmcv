name: publish_arm64_legacy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v2.3.7.post1'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  jetpack-wheelhouse:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        jetpack: ['61']
    env:
      PYTORCH: '2.11.0'
    steps:
      - id: ref
        env:
          RELEASE_REF: ${{ github.event.inputs.tag }}
        run: |
          python - "$RELEASE_REF" <<'PY'
          import re
          import sys
          tag = sys.argv[1]
          if not re.fullmatch(r"v[0-9]+[.][0-9]+[.][0-9]+[A-Za-z0-9_.+-]*", tag):
              raise SystemExit(f"invalid release tag: {tag!r}")
          PY
          printf 'release_ref=%s\n' "$RELEASE_REF" >> "$GITHUB_OUTPUT"
          printf 'TAG_NAME=%s\n' "$RELEASE_REF" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          ref: refs/tags/${{ steps.ref.outputs.release_ref }}

      - name: Validate release tag
        run: python scripts/validate_release_tag.py "${{ steps.ref.outputs.release_ref }}"

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: docker/build
          push: false
          file: docker/build/Dockerfile.jetpack${{ matrix.jetpack }}
          tags: mmcv-builder:${{ env.TAG_NAME }}-jetpack${{ matrix.jetpack }}-torch${{ env.PYTORCH }}
          load: true

      - name: Build wheel
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/mmcv/dist:/out" \
            mmcv-builder:${{ env.TAG_NAME }}-jetpack${{ matrix.jetpack }}-torch${{ env.PYTORCH }}

      - name: List generated files
        run: ls -la ./mmcv/dist

      - name: Upload to wheelhouse bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.WHEELHOUSE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.WHEELHOUSE_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          PYTORCH_TRIMMED=${PYTORCH%.*}
          PYTORCH_CLEAN=${PYTORCH_TRIMMED//.}
          aws s3 sync ./mmcv/dist/ \
            s3://${{ secrets.WHEELHOUSE_S3_BUCKET }}/jetpack${{ matrix.jetpack }}-torch"$PYTORCH_CLEAN"0/onedl-mmcv/ \
            --endpoint-url "${{ secrets.WHEELHOUSE_S3_ENDPOINT }}" \
            --exclude '.gitignore'
