name: build-wheel-builder-images

on:
  workflow_dispatch:
    inputs:
      image_id:
        description: 'Optional builder image id, for example ml234-cu126-gcc13 or jetpack61-torch2110'
        required: false
        type: string
  push:
    paths:
      - 'docker/build/**'
      - 'ci/build-matrix.json'
      - 'scripts/release_matrix.py'
      - '.github/workflows/build-wheel-builder-images.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.image_id || 'all' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  gen-matrix:
    runs-on: ubuntu-24.04
    outputs:
      images: ${{ steps.gen.outputs.images }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: gen
        env:
          IMAGE_ID: ${{ github.event.inputs.image_id || '' }}
        run: echo "images=$(python scripts/release_matrix.py gen-wheel-builder-matrix --image-id "$IMAGE_ID")" >> "$GITHUB_OUTPUT"

  build:
    needs: gen-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gen-matrix.outputs.images) }}
    steps:
      - uses: actions/checkout@v5
      - name: Reclaim runner disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: false
          load: true
          tags: |
            ${{ matrix.image }}:${{ matrix.spec_tag }}
            ${{ matrix.image }}:sha-${{ github.sha }}
            ${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.base.name=${{ matrix.base_image }}
            org.opencontainers.image.version=${{ matrix.spec_tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            CUDA_PKG_VERSION=${{ matrix.cuda_pkg_version }}
            AUDITWHEEL_PLAT=${{ matrix.auditwheel_plat }}
            GCC_TOOLSET=${{ matrix.gcc_toolset }}
            RPM_ARCH=x86_64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test image
        run: |
          bash "${{ matrix.smoke_script }}" \
            "${{ matrix.image }}:${{ matrix.spec_tag }}" \
            "${{ matrix.id }}"
      - name: Push GHCR image
        id: push
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        env:
          IMAGE: ${{ matrix.image }}
          SPEC_TAG: ${{ matrix.spec_tag }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          push_output="$(docker push "${IMAGE}:${SPEC_TAG}")"
          printf '%s\n' "$push_output"
          digest="$(printf '%s\n' "$push_output" | awk '/digest:/ {print $3}' | tail -n1)"
          if [ -z "$digest" ]; then
            echo "failed to resolve pushed digest for ${IMAGE}:${SPEC_TAG}" >&2
            exit 1
          fi
          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:latest"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@v3
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Write digest summary
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        run: echo "${{ matrix.id }} ${{ matrix.image }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
