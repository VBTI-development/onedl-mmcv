name: publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v2.3.7.post1; optional for dry runs'
        required: false
        type: string
      ref:
        description: 'Git ref to build for dry runs; defaults to the workflow branch'
        required: false
        type: string
      dry_run:
        description: 'Build and verify artifacts without publishing them'
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.validate.outputs.version }}
      release_ref: ${{ steps.ref.outputs.release_ref }}
      release_tag: ${{ steps.ref.outputs.release_tag }}
    steps:
      - id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_REF: ${{ github.event.inputs.ref }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          tag = os.environ["INPUT_TAG"].strip()
          ref = os.environ["INPUT_REF"].strip()
          dry_run = os.environ["DRY_RUN"] == "true"
          event_name = os.environ["EVENT_NAME"]
          current_ref = os.environ["GITHUB_REF_NAME"]

          if event_name == "push":
              tag = current_ref
              ref = f"refs/tags/{tag}"
          elif dry_run:
              ref = ref or current_ref
          else:
              if not tag:
                  raise SystemExit("tag is required when dry_run is false")
              ref = f"refs/tags/{tag}"

          if tag and not re.fullmatch(r"v[0-9]+[.][0-9]+[.][0-9]+[A-Za-z0-9_.+-]*", tag):
              raise SystemExit(f"invalid release tag: {tag!r}")
          if not ref:
              raise SystemExit("release ref is required")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"release_ref={ref}\n")
              output.write(f"release_tag={tag}\n")
          PY
      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.release_ref }}
      - name: Validate release tag
        id: validate
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.release_tag }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            python scripts/validate_release_tag.py "$RELEASE_TAG" --write-github-output
          else
            python - <<'PY'
            import os
            import tomllib
            with open('pyproject.toml', 'rb') as handle:
                version = tomllib.load(handle)['project']['version']
            with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
                output.write(f"version={version}\n")
                output.write("tag=\n")
            print(version)
            PY
          fi

  build-sdist:
    needs: validate-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Build sdist
        run: uv build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-linux-wheels:
    needs: validate-release
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: cpu
            name: Linux CPU wheels
            runner: ubuntu-24.04
            force_cuda: '0'
            cuda: cpu
            manylinux_image: manylinux_2_28
            cibw_build: cp310-manylinux_x86_64 cp312-manylinux_x86_64
            torch_cuda_arch_list: ''
          - id: cu118
            name: Linux CUDA 11.8 wheels
            runner: ubuntu-24.04
            force_cuda: '1'
            cuda: '11.8'
            manylinux_image: sameli/manylinux2014_x86_64_cuda_11.8
            cibw_build: cp310-manylinux_x86_64
            torch_cuda_arch_list: 7.5 8.0 8.6 8.9 9.0
          - id: cu129
            name: Linux CUDA 12.9 wheels
            runner: ubuntu-24.04
            force_cuda: '1'
            cuda: '12.9'
            manylinux_image: sameli/manylinux_2_34_x86_64_cuda_12.9
            cibw_build: cp310-manylinux_x86_64 cp312-manylinux_x86_64
            torch_cuda_arch_list: 7.5 8.6 8.9 9.0 12.0
          - id: cu130
            name: Linux CUDA 13.0 wheels
            runner: ubuntu-24.04
            force_cuda: '1'
            cuda: '13.0'
            manylinux_image: sameli/manylinux_2_34_x86_64_cuda_13.0
            cibw_build: cp312-manylinux_x86_64
            torch_cuda_arch_list: 7.5 8.6 8.9 9.0 12.0
    env:
      CIBW_BUILD: ${{ matrix.cibw_build }}
      CIBW_BUILD_VERBOSITY: 1
      CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.manylinux_image }}
      CIBW_ENVIRONMENT: >
        FORCE_CUDA=${{ matrix.force_cuda }}
        MMCV_REQUIRE_EXT=1
        MMCV_BUILD_GROUP=${{ matrix.id }}
        CUDA=${{ matrix.cuda }}
        TORCH_CUDA_ARCH_LIST='${{ matrix.torch_cuda_arch_list }}'
        UV_LINK_MODE=copy
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - name: Reclaim runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.23.0
        with:
          output-dir: wheelhouse/${{ matrix.id }}
      - name: Validate wheel metadata
        run: |
          uv run --with auditwheel python scripts/check_wheel_metadata.py \
            --wheel-dir "wheelhouse/${{ matrix.id }}" \
            --group-id "${{ matrix.id }}" \
            --version "${{ needs.validate-release.outputs.version }}" \
            --require-ext \
            --auditwheel \
            --output "wheelhouse/${{ matrix.id }}/metadata.json"
      - name: Write build manifest
        run: |
          python scripts/write_build_manifest.py \
            --wheel-dir "wheelhouse/${{ matrix.id }}" \
            --group-id "${{ matrix.id }}" \
            --version "${{ needs.validate-release.outputs.version }}" \
            --tag "${{ needs.validate-release.outputs.release_tag }}" \
            --git-sha "$(git rev-parse HEAD)" \
            --output "wheelhouse/${{ matrix.id }}/manifest.json"
      - uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-${{ matrix.id }}
          path: wheelhouse/${{ matrix.id }}/*
          if-no-files-found: error

  verify-wheelhouse:
    needs: [validate-release, build-sdist, build-linux-wheels]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          pattern: wheelhouse-*
          path: dist-artifacts
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Check sdist metadata
        run: uv run --with twine twine check dist/*.tar.gz
      - name: Verify wheel metadata
        run: |
          set -euo pipefail
          for group_dir in dist-artifacts/wheelhouse-*; do
            group_id="${group_dir##*/wheelhouse-}"
            uv run --with auditwheel python scripts/check_wheel_metadata.py \
              --wheel-dir "$group_dir" \
              --group-id "$group_id" \
              --version "${{ needs.validate-release.outputs.version }}" \
              --require-ext \
              --auditwheel
          done
      - name: Smoke install wheels
        run: |
          set -euo pipefail
          for group_dir in dist-artifacts/wheelhouse-*; do
            group_id="${group_dir##*/wheelhouse-}"
            for wheel in "$group_dir"/*.whl; do
              python -m venv .verify-venv
              . .verify-venv/bin/activate
              python -m pip install -U pip uv
              build_id="$(python -c 'import pathlib,re,sys; name=pathlib.Path(sys.argv[1]).name; m=re.match(r".+-.+-(cp\d+)-[^-]+-(.+)\.whl$", name); assert m, name; py, platform=m.groups(); print(f"{py}-manylinux_x86_64" if platform.startswith("manylinux") else f"{py}-{platform}")' "$wheel")"
              python scripts/select_torch.py \
                --group-id "$group_id" \
                --build-identifier "$build_id"
              python -m pip install "$wheel"
              python -c "import mmcv; import mmcv.ops; from mmcv.utils import ext_loader; assert ext_loader.check_ops_exist(); print(mmcv.__version__)"
              deactivate
              rm -rf .verify-venv
            done
          done

  publish-wheelhouse:
    needs: [validate-release, verify-wheelhouse]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
    runs-on: ubuntu-24.04
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.WHEELHOUSE_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.WHEELHOUSE_S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - uses: actions/download-artifact@v4
        with:
          pattern: wheelhouse-*
          path: dist-artifacts
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Verify artifacts before S3 publish
        run: |
          set -euo pipefail
          for group_dir in dist-artifacts/wheelhouse-*; do
            group_id="${group_dir##*/wheelhouse-}"
            uv run --with auditwheel python scripts/check_wheel_metadata.py \
              --wheel-dir "$group_dir" \
              --group-id "$group_id" \
              --version "${{ needs.validate-release.outputs.version }}" \
              --require-ext \
              --auditwheel
          done
      - name: Publish wheels to wheelhouse bucket
        run: |
          python scripts/publish_wheelhouse.py \
            --artifact-root dist-artifacts \
            --bucket "${{ secrets.WHEELHOUSE_S3_BUCKET }}" \
            --endpoint-url "${{ secrets.WHEELHOUSE_S3_ENDPOINT }}"

  publish-pypi:
    needs: [validate-release, build-sdist, publish-wheelhouse]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Publish sdist to PyPI
        run: uv publish dist/*.tar.gz

  discord-release:
    name: Announce Release on Discord
    needs: [validate-release, publish-wheelhouse, publish-pypi]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        run: |
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.validate-release.outputs.release_tag }}" \
            | jq -r '.body // ""' > release_body.txt
      - name: Send Discord release message
        env:
          RELEASE_REF: ${{ needs.validate-release.outputs.release_tag }}
        run: |
          RELEASE_BODY=$(cat release_body.txt)
          CONTENT="$(printf ':tada: **OneDL-MMCV Release Announcement!**\nA new version has just been published: **%s**\n%s\n:rocket: Happy deep learning!' "$RELEASE_REF" "$RELEASE_BODY")"
          curl -f -H "Content-Type: application/json" \
            -X POST \
            -d "$(jq -n --arg content "$CONTENT" '{"content": $content}')" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
