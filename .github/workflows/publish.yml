name: publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v2.3.7.post1; optional for dry runs'
        required: false
        type: string
      ref:
        description: 'Git ref to build for dry runs; defaults to the workflow branch'
        required: false
        type: string
      dry_run:
        description: 'Build and verify artifacts without publishing them'
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  validate-release:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.validate.outputs.version }}
      release_ref: ${{ steps.ref.outputs.release_ref }}
      release_tag: ${{ steps.ref.outputs.release_tag }}
    steps:
      - id: ref
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_REF: ${{ github.event.inputs.ref }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          tag = os.environ["INPUT_TAG"].strip()
          ref = os.environ["INPUT_REF"].strip()
          dry_run = os.environ["DRY_RUN"] == "true"
          event_name = os.environ["EVENT_NAME"]
          current_ref = os.environ["GITHUB_REF_NAME"]

          if event_name == "push":
              tag = current_ref
              ref = f"refs/tags/{tag}"
          elif dry_run:
              ref = ref or current_ref
          else:
              if not tag:
                  raise SystemExit("tag is required when dry_run is false")
              ref = f"refs/tags/{tag}"

          if tag and not re.fullmatch(r"v[0-9]+[.][0-9]+[.][0-9]+[A-Za-z0-9_.+-]*", tag):
              raise SystemExit(f"invalid release tag: {tag!r}")
          if not ref:
              raise SystemExit("release ref is required")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"release_ref={ref}\n")
              output.write(f"release_tag={tag}\n")
          PY
      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.release_ref }}
      - name: Validate release tag
        id: validate
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.release_tag }}
        run: python scripts/validate_release_tag.py "$RELEASE_TAG" --allow-missing-tag --write-github-output

  build-sdist:
    needs: validate-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Build sdist
        run: uv build --sdist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  gen-matrix:
    needs: validate-release
    runs-on: ubuntu-24.04
    outputs:
      linux: ${{ steps.gen.outputs.linux }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - id: gen
        run: echo "linux=$(python scripts/release_matrix.py gen-matrix --kind linux)" >> "$GITHUB_OUTPUT"

  build-linux-wheels:
    needs: [validate-release, gen-matrix]
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.gen-matrix.outputs.linux) }}
    env:
      CIBW_BUILD: ${{ matrix.cibw_build }}
      CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.manylinux_image }}
      CIBW_ENVIRONMENT: >
        FORCE_CUDA=${{ matrix.force_cuda }}
        MMCV_REQUIRE_EXT=1
        MMCV_BUILD_GROUP=${{ matrix.id }}
        CUDA=${{ matrix.cuda }}
        TORCH_CUDA_ARCH_LIST='${{ matrix.torch_cuda_arch_list }}'
        UV_LINK_MODE=copy
        SCCACHE_DIR=/output/.sccache/${{ matrix.id }}
        SCCACHE_CACHE_SIZE=10G
        SCCACHE_IDLE_TIMEOUT=0
        SCCACHE_BASEDIR=/project
        SCCACHE_ERROR_LOG=/tmp/sccache-debug.log
        SCCACHE_LOG=debug
        SCCACHE_PREPROCESSOR_PROBE=1
        SCCACHE_PROBE_TARGETS=sparse_pool_ops.cpp,spconv_ops.cpp,voxelization.cpp
        PYTORCH_NVCC='sccache /usr/local/cuda/bin/nvcc'
        TORCH_EXTENSION_SKIP_NVCC_GEN_DEPENDENCIES=1
        CXX=/opt/sccache-shims/c++
        GCC_TOOLSET=${{ matrix.gcc_toolset }}
        PATH=${{ matrix.cc_path_prefix }}$PATH
        LD_LIBRARY_PATH=${{ matrix.cc_ld_prefix }}$LD_LIBRARY_PATH
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Reclaim runner disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Prepare sccache archive directory
        run: mkdir -p "wheelhouse/${{ matrix.id }}/.sccache/${{ matrix.id }}"
      - name: Restore sccache archive
        uses: actions/cache/restore@v5
        with:
          path: wheelhouse/${{ matrix.id }}/.sccache/${{ matrix.id }}
          key: sccache-${{ matrix.id }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            sccache-${{ matrix.id }}-
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.23.0
        with:
          output-dir: wheelhouse/${{ matrix.id }}
      - name: Save sccache archive
        if: always()
        uses: actions/cache/save@v5
        with:
          path: wheelhouse/${{ matrix.id }}/.sccache/${{ matrix.id }}
          key: sccache-${{ matrix.id }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Upload sccache diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sccache-${{ matrix.id }}
          path: wheelhouse/${{ matrix.id }}/sccache-logs/${{ matrix.id }}/**
          if-no-files-found: ignore
      - name: Validate wheel metadata
        run: |
          uv run --no-project --with auditwheel python scripts/check_wheel_metadata.py \
            --wheel-dir "wheelhouse/${{ matrix.id }}" \
            --group-id "${{ matrix.id }}" \
            --version "${{ needs.validate-release.outputs.version }}" \
            --require-ext \
            --auditwheel \
            --output "wheelhouse/${{ matrix.id }}/metadata.json"
      - name: Write build manifest
        run: |
          python scripts/write_build_manifest.py \
            --wheel-dir "wheelhouse/${{ matrix.id }}" \
            --group-id "${{ matrix.id }}" \
            --version "${{ needs.validate-release.outputs.version }}" \
            --tag "${{ needs.validate-release.outputs.release_tag }}" \
            --git-sha "$(git rev-parse HEAD)" \
            --output "wheelhouse/${{ matrix.id }}/manifest.json"
      - uses: actions/upload-artifact@v7
        with:
          name: wheelhouse-${{ matrix.id }}
          path: |
            wheelhouse/${{ matrix.id }}/*.whl
            wheelhouse/${{ matrix.id }}/*.json
          if-no-files-found: error

  build-jetpack-wheels:
    needs: validate-release
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - jetpack: '61'
            name: Jetson JetPack 6.1 wheels
            pytorch: '2.11.0'
            builder_image: ghcr.io/4o3f/onedl-mmcv-builders/jetpack61-torch2110:latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull JetPack builder image
        run: docker pull "${{ matrix.builder_image }}"
      - name: Build wheel
        run: |
          mkdir -p dist
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/dist:/out" \
            -w /workspace \
            "${{ matrix.builder_image }}"
      - name: List generated files
        run: ls -la dist
      - name: Stage wheel into group directory
        run: |
          mkdir -p "wheelhouse/jetpack${{ matrix.jetpack }}"
          cp dist/*.whl "wheelhouse/jetpack${{ matrix.jetpack }}/"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Validate wheel metadata
        run: |
          uv run --no-project --with auditwheel python scripts/check_wheel_metadata.py \
            --wheel-dir "wheelhouse/jetpack${{ matrix.jetpack }}" \
            --group-id "jetpack${{ matrix.jetpack }}" \
            --version "${{ needs.validate-release.outputs.version }}" \
            --require-ext \
            --auditwheel \
            --output "wheelhouse/jetpack${{ matrix.jetpack }}/metadata.json"
      - name: Write build manifest
        run: |
          python scripts/write_build_manifest.py \
            --wheel-dir "wheelhouse/jetpack${{ matrix.jetpack }}" \
            --group-id "jetpack${{ matrix.jetpack }}" \
            --version "${{ needs.validate-release.outputs.version }}" \
            --tag "${{ needs.validate-release.outputs.release_tag }}" \
            --git-sha "$(git rev-parse HEAD)" \
            --output "wheelhouse/jetpack${{ matrix.jetpack }}/manifest.json"
      - uses: actions/upload-artifact@v7
        with:
          name: wheelhouse-jetpack${{ matrix.jetpack }}
          path: wheelhouse/jetpack${{ matrix.jetpack }}/*
          if-no-files-found: error

  verify-wheelhouse:
    needs: [validate-release, build-sdist, build-linux-wheels, build-jetpack-wheels]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          pattern: wheelhouse-*
          path: dist-artifacts
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Check sdist metadata
        run: uv run --no-project --with twine twine check dist/*.tar.gz
      - name: Verify wheel metadata
        run: |
          set -euo pipefail
          for group_dir in dist-artifacts/wheelhouse-*; do
            group_id="${group_dir##*/wheelhouse-}"
            uv run --no-project --with auditwheel python scripts/check_wheel_metadata.py \
              --wheel-dir "$group_dir" \
              --group-id "$group_id" \
              --version "${{ needs.validate-release.outputs.version }}" \
              --require-ext \
              --auditwheel
          done
      - name: Smoke install wheels
        run: |
          set -euo pipefail
          repo_root="$(pwd)"
          for group_dir in dist-artifacts/wheelhouse-*; do
            group_id="${group_dir##*/wheelhouse-}"
            for wheel in "$group_dir"/*.whl; do
              case "$wheel" in
                *x86_64*.whl) ;;
                *) echo "Skipping non-x86_64 wheel on x86 runner: $wheel"; continue ;;
              esac
              build_id="$(python -c 'import pathlib,re,sys; name=pathlib.Path(sys.argv[1]).name; m=re.match(r".+-.+-(cp\d+)-[^-]+-(.+)\.whl$", name); assert m, name; py, platform=m.groups(); print(f"{py}-manylinux_x86_64" if platform.startswith("manylinux") else f"{py}-{platform}")' "$wheel")"
              py_version="$(python -c 'import pathlib,re,sys; name=pathlib.Path(sys.argv[1]).name; m=re.match(r".+-.+-cp(\d)(\d+)-.+\.whl$", name); assert m, name; print(f"{m.group(1)}.{m.group(2)}")' "$wheel")"
              uv venv --python "$py_version" .verify-venv
              verify_python="$repo_root/.verify-venv/bin/python"
              "$verify_python" scripts/select_torch.py \
                --group-id "$group_id" \
                --build-identifier "$build_id"
              uv pip install --python "$verify_python" "$wheel"
              # Import from outside the repo root so the installed wheel is exercised
              # instead of the local mmcv/ source tree (which ships no compiled _ext).
              ( cd "$repo_root/.verify-venv" && "$verify_python" -c "import mmcv; import mmcv.ops; from mmcv.utils import ext_loader; assert ext_loader.check_ops_exist(); print(mmcv.__version__)" )
              rm -rf .verify-venv
            done
          done

  publish-wheelhouse:
    needs: [validate-release, verify-wheelhouse]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
    runs-on: ubuntu-24.04
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.WHEELHOUSE_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.WHEELHOUSE_S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.release_ref }}
      - uses: actions/download-artifact@v8
        with:
          pattern: wheelhouse-*
          path: dist-artifacts
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Verify artifacts before S3 publish
        run: |
          set -euo pipefail
          for group_dir in dist-artifacts/wheelhouse-*; do
            group_id="${group_dir##*/wheelhouse-}"
            uv run --no-project --with auditwheel python scripts/check_wheel_metadata.py \
              --wheel-dir "$group_dir" \
              --group-id "$group_id" \
              --version "${{ needs.validate-release.outputs.version }}" \
              --require-ext \
              --auditwheel
          done
      - name: Publish wheels to wheelhouse bucket
        run: |
          python scripts/publish_wheelhouse.py \
            --artifact-root dist-artifacts \
            --bucket "${{ secrets.WHEELHOUSE_S3_BUCKET }}" \
            --endpoint-url "${{ secrets.WHEELHOUSE_S3_ENDPOINT }}"

  publish-pypi:
    needs: [validate-release, build-sdist, publish-wheelhouse]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Publish sdist to PyPI
        run: uv publish dist/*.tar.gz

  discord-release:
    name: Announce Release on Discord
    needs: [validate-release, publish-wheelhouse, publish-pypi]
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        run: |
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.validate-release.outputs.release_tag }}" \
            | jq -r '.body // ""' > release_body.txt
      - name: Send Discord release message
        env:
          RELEASE_REF: ${{ needs.validate-release.outputs.release_tag }}
        run: |
          RELEASE_BODY=$(cat release_body.txt)
          CONTENT="$(printf ':tada: **OneDL-MMCV Release Announcement!**\nA new version has just been published: **%s**\n%s\n:rocket: Happy deep learning!' "$RELEASE_REF" "$RELEASE_BODY")"
          curl -f -H "Content-Type: application/json" \
            -X POST \
            -d "$(jq -n --arg content "$CONTENT" '{"content": $content}')" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
