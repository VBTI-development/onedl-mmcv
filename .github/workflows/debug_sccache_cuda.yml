name: debug_sccache_cuda

on:
  workflow_dispatch:
    inputs:
      group_id:
        description: 'CUDA build group to debug'
        required: true
        default: cu130-torch2120
        type: choice
        options:
          - cu118-torch241
          - cu126-torch280
          - cu126-torch2120
          - cu128-torch280
          - cu130-torch2120
      python_tag:
        description: 'Python ABI tag to build'
        required: true
        default: cp310
        type: choice
        options:
          - cp310
          - cp311
          - cp312
          - cp313
      cache_scope:
        description: 'Stable debug cache scope; use the same value across two runs'
        required: true
        default: default
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.group_id }}-${{ inputs.python_tag }}-${{ inputs.cache_scope }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  actions: write

jobs:
  debug-cuda-sccache:
    runs-on: ubuntu-24.04
    env:
      GROUP_ID: ${{ inputs.group_id }}
      PYTHON_TAG: ${{ inputs.python_tag }}
      CACHE_SCOPE: ${{ inputs.cache_scope }}
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Reclaim runner disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.12'
      - name: Resolve debug target
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          group_id = os.environ['GROUP_ID']
          python_tag = os.environ['PYTHON_TAG']
          build_id = f'{python_tag}-manylinux_x86_64'
          matrix = json.loads(subprocess.check_output([
              sys.executable,
              'scripts/release_matrix.py',
              'gen-matrix',
              '--kind',
              'linux',
          ], text=True))
          matches = [item for item in matrix['include'] if item['id'] == group_id]
          if not matches:
              raise SystemExit(f'unknown group_id: {group_id}')
          target = matches[0]
          if target['cuda'] == 'cpu':
              raise SystemExit('debug_sccache_cuda only supports CUDA groups')
          if build_id not in target['cibw_build'].split():
              raise SystemExit(
                  f'{build_id} is not configured for {group_id}; valid: {target["cibw_build"]}'
              )

          workspace = os.environ['GITHUB_WORKSPACE']
          debug_wheelhouse = f'debug-wheelhouse/{group_id}'
          sccache_host_dir = f'{debug_wheelhouse}/.sccache/{group_id}'
          sccache_container_dir = f'/host{workspace}/{sccache_host_dir}'
          cibw_environment = [
              f'FORCE_CUDA={target["force_cuda"]}',
              'MMCV_REQUIRE_EXT=1',
              f'MMCV_BUILD_GROUP={group_id}',
              f'CUDA={target["cuda"]}',
              f'TORCH_CUDA_ARCH_LIST={target["torch_cuda_arch_list"]!r}',
              'UV_LINK_MODE=copy',
              f'SCCACHE_DIR={sccache_container_dir}',
              'SCCACHE_CACHE_SIZE=10G',
              'SCCACHE_IDLE_TIMEOUT=0',
              'SCCACHE_BASEDIR=/project',
              'SCCACHE_DIRECT=true',
              'SCCACHE_ERROR_LOG=/tmp/sccache-debug.log',
              'SCCACHE_LOG=debug',
              'SCCACHE_PREPROCESSOR_PROBE=1',
              'SCCACHE_PROBE_TARGETS=active_rotated_filter_cuda.cu,ball_query_cuda.cu,bbox_overlaps_cuda.cu',
              f'SCCACHE_DIAGNOSTIC_DIR=/output/sccache-logs/{group_id}',
              "PYTORCH_NVCC='sccache /usr/local/cuda/bin/nvcc'",
              'TORCH_EXTENSION_SKIP_NVCC_GEN_DEPENDENCIES=1',
              'CXX=/opt/sccache-shims/c++',
              f'GCC_TOOLSET={target["gcc_toolset"]}',
              f'PATH={target["cc_path_prefix"]}$PATH',
              f'LD_LIBRARY_PATH={target["cc_ld_prefix"]}$LD_LIBRARY_PATH',
          ]

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env:
              env.write(f'CIBW_BUILD={build_id}\n')
              env.write(f'CIBW_MANYLINUX_X86_64_IMAGE={target["manylinux_image"]}\n')
              env.write(f'DEBUG_WHEELHOUSE={debug_wheelhouse}\n')
              env.write(f'SCCACHE_HOST_DIR={sccache_host_dir}\n')
              env.write('CIBW_TEST_SKIP=*\n')
              env.write('CIBW_ENVIRONMENT<<EOF\n')
              env.write(' '.join(cibw_environment))
              env.write('\nEOF\n')
          PY
      - name: Prepare debug sccache directory
        run: mkdir -p "$SCCACHE_HOST_DIR"
      - name: Restore debug sccache archive
        uses: actions/cache/restore@v5
        with:
          path: debug-wheelhouse/${{ inputs.group_id }}/.sccache/${{ inputs.group_id }}
          key: debug-sccache-${{ inputs.group_id }}-${{ inputs.python_tag }}-${{ inputs.cache_scope }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            debug-sccache-${{ inputs.group_id }}-${{ inputs.python_tag }}-${{ inputs.cache_scope }}-
      - name: Build debug wheel with cibuildwheel
        uses: pypa/cibuildwheel@v2.23.0
        with:
          output-dir: debug-wheelhouse/${{ inputs.group_id }}
      - name: Make debug sccache archive readable
        run: sudo chmod -R a+rX "$SCCACHE_HOST_DIR"
      - name: Save debug sccache archive
        uses: actions/cache/save@v5
        with:
          path: debug-wheelhouse/${{ inputs.group_id }}/.sccache/${{ inputs.group_id }}
          key: debug-sccache-${{ inputs.group_id }}-${{ inputs.python_tag }}-${{ inputs.cache_scope }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Upload debug diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-sccache-${{ inputs.group_id }}-${{ inputs.python_tag }}-${{ github.run_id }}
          path: debug-wheelhouse/${{ inputs.group_id }}/sccache-logs/${{ inputs.group_id }}/**
          if-no-files-found: error
      - name: Upload debug wheel
        uses: actions/upload-artifact@v7
        with:
          name: debug-wheel-${{ inputs.group_id }}-${{ inputs.python_tag }}-${{ github.run_id }}
          path: debug-wheelhouse/${{ inputs.group_id }}/*.whl
          if-no-files-found: error
